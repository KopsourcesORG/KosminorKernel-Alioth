name: Build K-Nel Alioth (Release)
on:
  push:
    tags:
      - "R-*"

jobs:
  build-vanilla:
    name: Build K-Nel Alioth (Release) by ${{ github.actor }}
    runs-on: ubuntu-24.04
    steps:

      - name: Set Beijing timezone
        uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Set SWAP to 5GiB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5
          
      - name: Get Tag Name
        id: get-tag
        run: |
          echo "TAG_NAME=$(echo $GITHUB_REF | cut -d'/' -f3)" >> $GITHUB_OUTPUT

      - name: Initialize Compilation Environment
        run: |
          sudo apt-get update
          sudo apt-get install git automake build-essential bc -y
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
          
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.TAG_NAME }}

      - name: Get Toolchain
        run: |
          git clone https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone.git --depth 1 toolchain/llvm
          git clone https://github.com/KJ-Network/python-2.7.18-prebuilt.git --depth=1 toolchain/python2
          
      - name: Processing submodules
        run: |
          git submodule update --init --remote --rebase --recursive android/Installer
          git submodule update --init --remote --rebase --recursive KernelSU
          sed -i -e '$a\'$'\n''CONFIG_KSU=n' arch/arm64/configs/alioth_k-nel_defconfig
          
      - name: Build Kernel
        run: |
          export LOCALVERSION=${{ steps.get-tag.outputs.TAG_NAME }}
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
          export ARCH="arm64"
          export SUBARCH="arm64"
          export PATH="$GITHUB_WORKSPACE/toolchain/llvm/bin:$GITHUB_WORKSPACE/toolchain/python2/bin:$PATH"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/toolchain/llvm/lib64:$GITHUB_WORKSPACE/toolchain/python2/lib:$LD_LIBRARY_PATH"
          export KBUILD_COMPILER_STRING=$(clang --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//')
          export KBUILD_LINKER_STRING=$(ld.lld --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//' | sed 's/(compatible with [^)]*)//')
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_TRIPLE="aarch64-linux-gnu-"
          export CROSS_COMPILE="aarch64-linux-android-"
          make O=out alioth_k-nel_defconfig
          make -j$(nproc --all) O=out 2>&1

      - name: Pack Kernel
        run: |
          cp out/arch/arm64/boot/Image .
          cp out/arch/arm64/boot/dts/vendor/qcom/*.dtb .
          gzip -k Image Image.gz
          cat Image.gz *.dtb > Image.gz-dtb
          cp Image.gz-dtb android/Installer/
          cp out/arch/arm64/boot/dtbo.img android/Installer/
          sed -i '/description/ s/$/ Just installed K-Nel Alioth version: ${{ steps.get-tag.outputs.TAG_NAME }}/' android/Installer/module.prop
          
      - name: Upload Kernel Package
        uses: actions/upload-artifact@v4
        with:
          name: K-Nel_Alioth_${{ steps.get-tag.outputs.TAG_NAME }}_Installer
          path: android/Installer/*
          
  build-ksu:
    name: Build K-Nel Alioth (Release) by ${{ github.actor }}
    runs-on: ubuntu-24.04
    steps:

      - name: Set Beijing timezone
        uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Set SWAP to 5GiB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5
          
      - name: Get Tag Name
        id: get-tag
        run: |
          echo "TAG_NAME=$(echo $GITHUB_REF | cut -d'/' -f3)" >> $GITHUB_OUTPUT

      - name: Initialize Compilation Environment
        run: |
          sudo apt-get update
          sudo apt-get install git automake build-essential bc -y
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
          
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-tag.outputs.TAG_NAME }}

      - name: Get Toolchain
        run: |
          git clone https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone.git --depth 1 toolchain/llvm
          git clone https://github.com/KJ-Network/python-2.7.18-prebuilt.git --depth=1 toolchain/python2
          
      - name: Processing submodules
        run: |
          git submodule update --init --remote --rebase --recursive android/Installer
          git submodule update --init --remote --rebase --recursive KernelSU
          cd KernelSU
          git fetch --tags
          LATEST_TAG=$(git tag -l | sort -V | tail -n1)
          git checkout $LATEST_TAG
          sed -i -e '$a\'$'\n''CONFIG_KSU=y\nCONFIG_KSU_MANUAL_HOOK=y' ../arch/arm64/configs/alioth_k-nel_defconfig
          
      - name: Build Kernel
        run: |
          export LOCALVERSION=${{ steps.get-tag.outputs.TAG_NAME }}
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
          export ARCH="arm64"
          export SUBARCH="arm64"
          export PATH="$GITHUB_WORKSPACE/toolchain/llvm/bin:$GITHUB_WORKSPACE/toolchain/python2/bin:$PATH"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/toolchain/llvm/lib64:$GITHUB_WORKSPACE/toolchain/python2/lib:$LD_LIBRARY_PATH"
          export KBUILD_COMPILER_STRING=$(clang --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//')
          export KBUILD_LINKER_STRING=$(ld.lld --version | head -n 1 | perl -pe 's/\(http.*?\)//gs' | sed -e 's/  */ /g' -e 's/[[:space:]]*$//' | sed 's/(compatible with [^)]*)//')
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_TRIPLE="aarch64-linux-gnu-"
          export CROSS_COMPILE="aarch64-linux-android-"
          make O=out alioth_k-nel_defconfig
          make -j$(nproc --all) O=out 2>&1

      - name: Pack Kernel
        run: |
          cp out/arch/arm64/boot/Image .
          cp out/arch/arm64/boot/dts/vendor/qcom/*.dtb .
          gzip -k Image Image.gz
          cat Image.gz *.dtb > Image.gz-dtb
          cp Image.gz-dtb android/Installer/
          cp out/arch/arm64/boot/dtbo.img android/Installer/
          sed -i '/description/ s/$/ Just installed K-Nel Alioth version: ${{ steps.get-tag.outputs.TAG_NAME }}/' android/Installer/module.prop
          
      - name: Upload Kernel Package
        uses: actions/upload-artifact@v4
        with:
          name: K-Nel_Alioth_KSU_${{ steps.get-tag.outputs.TAG_NAME }}_Installer
          path: android/Installer/*
          
  Release: 
    needs:
      - build-vanilla
      - build-ksu
    runs-on: ubuntu-latest
    steps:
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        
      - name: Get Tag Name
        id: get-tag
        run: |
          echo "TAG_NAME=$(echo $GITHUB_REF | cut -d'/' -f3)" >> $GITHUB_OUTPUT
        
      - name: Pack artifacts
        run: |
          cd "$GITHUB_WORKSPACE/K-Nel_Alioth_${{ steps.get-tag.outputs.TAG_NAME }}_Installer"
          zip -r "K-Nel_Alioth_${{ steps.get-tag.outputs.TAG_NAME }}_Installer.zip" *
          mv "K-Nel_Alioth_${{ steps.get-tag.outputs.TAG_NAME }}_Installer.zip" ../
          cd "$GITHUB_WORKSPACE/K-Nel_Alioth_KSU_${{ steps.get-tag.outputs.TAG_NAME }}_Installer"
          zip -r "K-Nel_Alioth_KSU_${{ steps.get-tag.outputs.TAG_NAME }}_Installer.zip" *
          mv "K-Nel_Alioth_KSU_${{ steps.get-tag.outputs.TAG_NAME }}_Installer.zip" ../

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.TOKEN }}
          files: |
            ${{github.workspace}}/K-Nel_Alioth_${{ steps.get-tag.outputs.TAG_NAME }}_Installer.zip
            ${{github.workspace}}/K-Nel_Alioth_KSU_${{ steps.get-tag.outputs.TAG_NAME }}_Installer.zip
